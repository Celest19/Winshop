<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - WinShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Conexión a tu hoja de estilos modificada -->
    <link rel="stylesheet" href="../Diseño/login.css">
</head>

<body>

<div class="container">

    <div class="card">

        <a href="Index.html" class="back-to-home">← Volver al inicio</a>

        <h2>Bienvenido a <span>WinShop</span></h2>

        <p class="subtitle">
            Ingresa tu usuario y contraseña para continuar
        </p>

        <!-- Caja de error optimizada como alerta -->
        <div class="error-msg" id="errorLogin">
            ⚠️ Correo o contraseña incorrectos. Inténtalo de nuevo.
        </div>

        <form id="formLogin">

            <label for="correo">Correo electrónico</label>
            <input
                id="correo"
                name="correo"
                type="email" 
                placeholder="ejemplo@correo.com" 
                required
            >

            <label for="password">Contraseña</label>
            <input
                id="password"
                name="password"
                type="password" 
                placeholder="Ingresa tu contraseña" 
                required
            >

            <button type="submit">
                Iniciar Sesión
            </button>

        </form>

        <p class="registro">
            ¿No tienes cuenta? <a href="Registro.html">Regístrate aquí</a>
        </p>

    </div>

</div>


<footer>
    © 2026 WinShop - Proyecto Universitario - Todos los derechos reservados.
</footer>

<script src="../Funcionalidad/login.js"></script>

</body>
</html>
