<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro - WinShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="../Diseño/registro.css">
</head>

<body>

<div class="container">

    <div class="card">

        <a href="Index.html" class="back-to-home">← Volver al inicio</a>

        <h2>Crea tu cuenta en <span>WinShop</span></h2>

        <p class="subtitle">
            Ingresa tus datos para registrarte en la plataforma
        </p>

        <div class="error-msg" id="errorRegistro"></div>

        <form id="formRegistro">

            <label for="nombre">Nombre completo</label>
            <input
                id="nombre"
                name="nombre"
                type="text"
                placeholder="Ingresa tu nombre completo"
                required
            >

            <label for="correo">Correo electrónico</label>
            <input 
                id="correo"
                name="correo"
                type="email"
                placeholder="ejemplo@correo.com"
                required
            >

            <label for="usuario">Usuario</label>
            <input
                id="usuario"
                name="usuario"
                type="text"
                placeholder="Crea un nombre de usuario"
                required
            >

            <label for="password">Contraseña</label>
            <input
                id="password"
                name="password"
                type="password"
                placeholder="Crea una contraseña segura"
                required
            >

            <label for="confirmPassword">Confirmar contraseña</label>
            <input
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                placeholder="Repite la contraseña"
                required
            >

            <label for="rol">Tipo de cuenta</label>
            <select id="rol" name="rol" required>
                <option value="" disabled selected>Selecciona tu rol en la tienda</option>
                <option value="cliente">Cliente (Quiero comprar)</option>
                <option value="vendedor">Vendedor (Quiero ofrecer productos)</option>
            </select>

            <button type="submit">
                Registrarse
            </button>

        </form>

        <p class="login-back">
            ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>
        </p>

    </div>

</div>

<footer>
    © 2026 WinShop - Proyecto Universitario - Todos los derechos reservados.
</footer>

<script src="../Funcionalidad/authentication.js"></script>

</body>
</html>
